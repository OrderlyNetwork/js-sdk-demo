include:
  - project: 'orderlynetwork/orderly-devops/orderly-common/common-ci'
    ref: main
    file: '/common-orderly-network-dev-v2.yaml'
  - project: 'orderlynetwork/orderly-devops/orderly-common/common-ci'
    ref: main
    file: '/common-orderly-network-qa-evm.yaml'

variables:
  SERVICE_NAME: dmm
  IMAGE_NAME: dmm

deploy_dev_v2:
  stage: deploy
  image:
    name: asia-northeast1-docker.pkg.dev/woo-orderly/orderly-devops/curl
    entrypoint: [""]
  script:
    - echo "Trigger dev v2 helm deploying ... "
    - curl -X POST --fail -F token=${DEPLOY_DMM_PRJ_TOKEN} -F "ref=aliyun-dev" -F "variables[SERVICE_NAME]=${SERVICE_NAME}" -F "variables[TAG]=${CI_COMMIT_TAG}" https://gitlab.com/api/v4/projects/${DEPLOY_DMM_PRJ_ID}/trigger/pipeline
  when: manual
  only:
    - tags
  tags:
    - dev
    - build

deploy_qa_evm:
  stage: deploy
  image:
    name: asia-northeast1-docker.pkg.dev/woo-orderly/orderly-devops/curl
    entrypoint: [""]
  script:
    - echo "Trigger qa-evm helm deploying ... "
    - curl -X POST --fail -F token=${DEPLOY_DMM_PRJ_TOKEN} -F "ref=aliyun-qa" -F "variables[SERVICE_NAME]=${SERVICE_NAME}" -F "variables[TAG]=${CI_COMMIT_TAG}" https://gitlab.com/api/v4/projects/${DEPLOY_DMM_PRJ_ID}/trigger/pipeline
  when: manual
  only:
    - tags
  tags:
    - dev
    - build


stages:
  - check_tag
  - build_docker
  - deploy
  - update_sdk_version

# Update dependencies job triggered by SDK project
update_sdk_version:
  stage: update_sdk_version
  image:
    name: asia-northeast1-docker.pkg.dev/woo-orderly/orderly-devops/node:20 
  script:
    - |
      npm install -g pnpm@9
      pnpm install --frozen-lockfile
      pnpm release
  rules:
    - if: '$PACKAGE_VERSION && $TRIGGER_BRANCH'
      when: always
  tags:
    - dev
    - build